<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>港鐵即時班次及都會票範圍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #101113;
      --panel: #1b1d20;
      --panel-soft: #24282c;
      --line: #343a40;
      --text: #f3f5f6;
      --muted: #a9b2bb;
      --accent: #18b7aa;
      --accent-strong: #12a195;
      --gold: #f2bd4b;
      --danger: #ff7070;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans HK", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 20px;
      line-height: 1.55;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 28px 18px 34px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    h1,
    h2 {
      margin: 0;
      font-weight: 750;
    }

    h1 {
      font-size: clamp(32px, 5vw, 48px);
      color: var(--text);
    }

    h2 {
      font-size: 28px;
    }

    .subtitle,
    .status,
    .source {
      color: var(--muted);
      font-size: 16px;
    }

    header,
    .subtitle,
    #clockText,
    #mapPanelHeader {
      display: none;
    }

    header .status {
      min-width: 180px;
      text-align: right;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-top: 18px;
      overflow: hidden;
    }

    main > .panel:first-child {
      margin-top: 0;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      padding: 20px;
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
    }

    .head-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .head-actions button {
      width: auto;
      min-height: 42px;
      padding: 0 16px;
      font-size: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)) auto;
      gap: 14px;
      padding: 18px 20px;
      align-items: end;
    }

    .schedule-controls {
      grid-template-columns: minmax(260px, 1fr) auto;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
    }

    select,
    input,
    button {
      width: 100%;
      min-height: 52px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font: inherit;
    }

    select,
    input {
      background: #121416;
      color: var(--text);
      padding: 0 14px;
    }

    button {
      appearance: none;
      border: 0;
      padding: 0 22px;
      background: var(--accent);
      color: #061312;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .map-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 18px 20px;
      align-items: center;
      border-top: 1px solid var(--line);
    }

    .selected-station {
      font-size: 24px;
      font-weight: 800;
    }

    .pass-note {
      color: var(--muted);
      font-size: 16px;
    }

    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 14px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: var(--panel-soft);
    }

    .legend-dot.good {
      background: rgba(24, 183, 170, 0.9);
      border-color: var(--accent);
    }

    .legend-dot.bad {
      background: rgba(255, 255, 255, 0.85);
      border-color: #9ca3af;
    }

    .route-map {
      position: relative;
      padding: 20px;
      overflow-x: auto;
      background: #bde5ef;
    }

    .map-canvas {
      position: relative;
      width: min(100%, 1240px);
      min-width: 980px;
      aspect-ratio: 1542 / 1020;
      margin: 0 auto;
      background: url("assets/routemap-names-removed.png") center / contain no-repeat;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
    }

    .station-button {
      position: relative;
      position: absolute;
      z-index: 2;
      width: auto;
      min-width: 42px;
      min-height: 0;
      height: auto;
      padding: 3px 6px;
      border: 1px solid rgba(23, 54, 93, 0.55);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.82);
      color: #082a5a;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.1;
      transition: opacity 0.2s ease, background 0.2s ease, transform 0.2s ease, filter 0.2s ease;
      transform: translate(-50%, -50%);
      box-shadow: 0 1px 4px rgba(255, 255, 255, 0.8);
    }

    .station-button.is-reasonable {
      background: rgba(24, 183, 170, 0.9);
      color: #052a27;
      border-color: #063a35;
      box-shadow: 0 0 0 3px rgba(24, 183, 170, 0.2);
    }

    .station-button.is-unreasonable,
    .station-button.is-out-of-scope {
      opacity: 0.82;
      filter: none;
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(117, 126, 138, 0.82);
      color: #586170;
    }

    .station-button.is-selected {
      opacity: 1;
      filter: none;
      background: var(--gold);
      color: #17130b;
      border-color: #ffe09a;
      transform: translate(-50%, -50%) scale(1.18);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .table-wrap {
      overflow-x: auto;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--line);
    }

    .line-schedules {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .line-schedule + .line-schedule {
      border-top: 1px solid var(--line);
    }

    .line-schedule-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 18px;
      background: #111315;
      border-bottom: 1px solid var(--line);
    }

    .line-schedule-head h3 {
      margin: 0;
      font-size: 21px;
    }

    .line-schedule-head span {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .line-schedule .schedule-grid {
      border-top: 0;
    }

    .direction-block + .direction-block {
      border-left: 1px solid var(--line);
    }

    .direction-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
      padding: 14px 18px;
      background: #16181a;
      border-bottom: 1px solid var(--line);
    }

    .direction-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .direction-note {
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
    }

    .schedule-grid .table-wrap {
      min-height: 278px;
    }

    .schedule-grid table {
      min-width: 480px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 16px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      background: #16181a;
      font-size: 15px;
      font-weight: 750;
    }

    td {
      font-size: 20px;
    }

    tbody tr:hover td {
      background: rgba(255, 255, 255, 0.035);
    }

    .numeric {
      font-size: 24px;
      font-weight: 800;
      color: var(--gold);
      white-space: nowrap;
    }

    .message {
      padding: 20px;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
    }

    .fare-summary {
      display: grid;
      gap: 8px;
      padding: 0 20px 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .fare-route {
      color: var(--text);
      font-size: 22px;
      font-weight: 800;
    }

    .source {
      margin-top: 18px;
    }

    @media (max-width: 760px) {
      body {
        font-size: 18px;
      }

      .page {
        padding: 0 0 22px;
      }

      .panel {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .schedule-controls {
        grid-template-columns: 1fr;
      }

      .schedule-grid {
        grid-template-columns: 1fr;
      }

      .line-schedule-head {
        padding: 10px 12px;
      }

      .line-schedule-head h3 {
        font-size: 20px;
      }

      .map-summary {
        grid-template-columns: 1fr;
      }

      .map-legend {
        justify-content: flex-start;
      }

      .route-map {
        padding: 8px 0;
        scroll-padding-inline: 16px;
      }

      .map-canvas {
        width: 1040px;
        min-width: 1040px;
      }

      .station-button {
        min-width: 34px;
        padding: 2px 4px;
        font-size: 10px;
      }

      .direction-block + .direction-block {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .direction-head {
        min-height: 48px;
        padding: 10px 12px;
      }

      .direction-head h3 {
        font-size: 20px;
      }

      .direction-note {
        font-size: 13px;
      }

      .schedule-grid .table-wrap {
        min-height: 0;
        overflow-x: visible;
      }

      .schedule-grid table {
        min-width: 0;
        table-layout: fixed;
      }

      .schedule-grid th,
      .schedule-grid td {
        padding: 9px 6px;
        font-size: 14px;
      }

      .schedule-grid th:nth-child(1),
      .schedule-grid td:nth-child(1) {
        width: 35%;
      }

      .schedule-grid th:nth-child(2),
      .schedule-grid td:nth-child(2) {
        width: 13%;
        text-align: center;
      }

      .schedule-grid th:nth-child(3),
      .schedule-grid td:nth-child(3) {
        width: 24%;
      }

      .schedule-grid th:nth-child(4),
      .schedule-grid td:nth-child(4) {
        width: 28%;
        white-space: nowrap;
      }

      .schedule-grid .numeric {
        font-size: 17px;
      }

      h2 {
        font-size: 24px;
      }

      td {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>港鐵即時班次及都會票範圍</h1>
        <div class="subtitle">預設顯示將軍澳綫康城站</div>
      </div>
      <div class="status" id="clockText">準備載入</div>
    </header>

    <main>
      <section class="panel" aria-labelledby="mapTitle">
        <div class="section-head" id="mapPanelHeader">
          <h2 id="mapTitle">選擇車站</h2>
          <div class="status" id="rangeStatus">都會票每程成本 HK$11.5</div>
        </div>
        <div class="route-map" id="routeMap"></div>
        <div class="map-summary">
          <div>
            <div class="selected-station" id="selectedStationText">康城・將軍澳綫</div>
            <div class="pass-note" id="passRangeText">計算都會票合理範圍中</div>
          </div>
          <div class="map-legend">
            <span class="legend-item"><span class="legend-dot good"></span>合理</span>
            <span class="legend-item"><span class="legend-dot bad"></span>不合理 / 不適用</span>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="scheduleTitle">
        <div class="section-head">
          <h2 id="scheduleTitle">即時班次</h2>
          <div class="head-actions">
            <div class="status" id="scheduleStatus">尚未更新</div>
            <button id="refreshSchedule" type="button">重新整理</button>
          </div>
        </div>
        <div class="line-schedules" id="scheduleContainer">
          <div class="message">載入中</div>
        </div>
      </section>
    </main>

    <div class="source">
      站點資料參考 DATA.GOV.HK「港鐵綫、車費和無障礙設施」；即時班次及都會票範圍由港鐵公開資料服務回傳。
    </div>
  </div>

    const LABEL_POINTS = {

      TSW: [298, 536], TWH: [392, 536], KWH: [462, 536], KWF: [552, 536], MEF: [702, 534], LCK: [773, 536], CSW: [852, 536], SSP: [930, 536], PRE: [945, 612], MOK: [944, 666], YMT: [944, 719], JOR: [945, 779], TST: [1010, 842], CEN: [832, 1022],
      KET: [466, 1022], HKU: [557, 1022], SYP: [648, 1022], SHW: [740, 1022], ADM: [921, 1028], WAC: [1010, 1022], CAB: [1102, 1022], TIH: [1190, 1022], FOH: [1283, 1022], NOP: [1373, 1022], QUB: [1462, 1022], TAK: [1554, 1022], SWH: [1644, 1022], SKW: [1710, 1088], HFC: [1717, 1142], CHW: [1717, 1212],
      WHA: [1292, 823], HOM: [1187, 742], SKM: [1058, 590], KOT: [1145, 536], LOF: [1201, 536], WTS: [1264, 536], DIH: [1389, 536], CHH: [1448, 536], KOB: [1541, 585], NTK: [1552, 638], KWT: [1552, 695], LAT: [1552, 755], YAT: [1560, 828], TIK: [1644, 822],
      TKO: [1720, 766], LHP: [1742, 912], HAH: [1720, 698], POA: [1714, 628],
      OCP: [1010, 1098], WCH: [868, 1156], LET: [715, 1212], SOH: [610, 1212],
      LOW: [673, 218], LMC: [616, 307], SHS: [757, 218], FAN: [840, 270], TWO: [924, 270], TAP: [1008, 270], UNI: [1105, 270], FOT: [1115, 334], SHT: [1115, 406], TAW: [1115, 476], MKK: [1115, 653], HUH: [1142, 865], EXC: [1042, 982],
      WKS: [1762, 270], MOS: [1674, 270], HEO: [1587, 270], TSH: [1501, 270], SHM: [1415, 270], CIO: [1328, 270], STW: [1315, 338], CKT: [1315, 407], HIK: [1252, 475], KAT: [1420, 635], SUW: [1388, 700], TKW: [1340, 750], ETS: [1042, 915], AUS: [908, 838], TWW: [330, 485], KSR: [305, 420], YUL: [302, 350], LOP: [305, 292], TIS: [252, 215], SIH: [168, 350], TUM: [232, 464]
    };
    const FARE_PREFERRED_LINE = {
      HOK: "TCL",
      KOW: "TCL",
      TSY: "TCL",
      LAK: "TCL",
      NAC: "TCL",
      ADM: "ISL",
      HUH: "TML",
      DIH: "TML",
      HOM: "TML",
      MEF: "TML"
    };

    const stationByCode = new Map();
    const stationById = new Map();
    const stationByLineCode = new Map();
    const stationsByLine = new Map();
    const valueStationByCode = new Map();
    const fareCache = new Map();
    const valueRangeCache = new Map();

    for (const station of STATION_ROWS) {
      if (!stationByCode.has(station.code)) stationByCode.set(station.code, station);
      if (!stationById.has(station.id)) stationById.set(station.id, station);
      stationByLineCode.set(`${station.line}|${station.code}`, station);
      if (!stationsByLine.has(station.line)) stationsByLine.set(station.line, []);
      stationsByLine.get(station.line).push(station);

      if (isCitySaverStation(station)) {
        const preferredLine = FARE_PREFERRED_LINE[station.code];
        const current = valueStationByCode.get(station.code);
        if (!current || station.line === preferredLine) {
          valueStationByCode.set(station.code, station);
        }
      }
    }

    const routeMap = document.querySelector("#routeMap");
    const selectedStationText = document.querySelector("#selectedStationText");
    const passRangeText = document.querySelector("#passRangeText");
    const rangeStatus = document.querySelector("#rangeStatus");
    const scheduleContainer = document.querySelector("#scheduleContainer");
    const scheduleStatus = document.querySelector("#scheduleStatus");
    const refreshScheduleButton = document.querySelector("#refreshSchedule");
    const clockText = document.querySelector("#clockText");
    let selectedStation = stationByLineCode.get("TKL|LHP");
    let scheduleRequestId = 0;
    let rangeRequestId = 0;
    let scheduleRenderedKey = "";
    let scheduleViews = new Map();

    function stationText(station) {
      return `${station.name} ${station.en}`;
    }

    function getScheduleStations(station) {
      const stations = STATION_ROWS
        .filter((item) => item.code === station.code)
        .sort((a, b) => LINE_ORDER.indexOf(a.line) - LINE_ORDER.indexOf(b.line));
      const seenLines = new Set();
      return stations.filter((item) => {
        if (seenLines.has(item.line)) return false;
        seenLines.add(item.line);
        return true;
      });
    }

    function isCitySaverStation(station) {
      return CITY_SAVER_FULL_LINES.has(station.line) || CITY_SAVER_PARTIAL_CODES[station.line]?.has(station.code);
    }

    function getLabelPoint(code, x, y) {
      return LABEL_POINTS[code] || [x, y];
    }

    function getFareStation(station) {
      return valueStationByCode.get(station.code);
    }

    function formatClock(date = new Date()) {
      return date.toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function formatApiTime(value) {
      if (!value) return "--:--";
      const timePart = value.includes(" ") ? value.split(" ")[1] : value;
      return timePart.slice(0, 5);
    }

    function addCell(row, text, className = "") {
      const cell = document.createElement("td");
      cell.textContent = text;
      if (className) cell.className = className;
      row.appendChild(cell);
    }

    function setDirectionMessage(body, note, text, isError = false) {
      body.innerHTML = "";
      const row = document.createElement("tr");
      const cell = document.createElement("td");
      cell.colSpan = 4;
      cell.textContent = text;
      cell.className = isError ? "message error" : "message";
      row.appendChild(cell);
      body.appendChild(row);
      note.textContent = isError ? "讀取失敗" : text;
    }

    function renderScheduleDirection(direction, trains, body, note) {
      const sortedTrains = [...(trains || [])]
        .sort((a, b) => String(a.time || "").localeCompare(String(b.time || "")));

      if (!sortedTrains.length) {
        setDirectionMessage(body, note, "暫無班次");
        return;
      }

      body.innerHTML = "";
      note.textContent = `${sortedTrains.length} 班`;

      for (const train of sortedTrains) {
        const row = document.createElement("tr");
        const destination = stationByCode.get(train.dest)?.name || train.dest || "-";
        const minutes = train.ttnt === "0" ? "即將" : `${train.ttnt || "-"} 分鐘`;

        addCell(row, destination);
        addCell(row, train.plat || "-");
        addCell(row, minutes, "numeric");
        addCell(row, formatApiTime(train.time));
        body.appendChild(row);
      }
    }

    function createScheduleDirectionBlock(line, direction) {
      const directionId = `${line}-${direction}-${Math.random().toString(36).slice(2)}`;
      const block = document.createElement("div");
      block.className = "direction-block";

      const head = document.createElement("div");
      head.className = "direction-head";

      const title = document.createElement("h3");
      title.textContent = DIRECTION_NAMES[direction] || direction;

      const note = document.createElement("span");
      note.className = "direction-note";
      note.id = directionId;
      note.textContent = "載入中";

      head.append(title, note);

      const wrap = document.createElement("div");
      wrap.className = "table-wrap";

      const table = document.createElement("table");
      table.setAttribute("aria-describedby", directionId);

      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      for (const label of ["目的地", "月台", "尚餘", "預計時間"]) {
        const cell = document.createElement("th");
        cell.textContent = label;
        headRow.appendChild(cell);
      }
      thead.appendChild(headRow);

      const body = document.createElement("tbody");
      table.append(thead, body);
      wrap.appendChild(table);
      block.append(head, wrap);

      setDirectionMessage(body, note, "載入中");
      return { block, body, note };
    }

    function createScheduleLineView(station) {
      const section = document.createElement("div");
      section.className = "line-schedule";

      const head = document.createElement("div");
      head.className = "line-schedule-head";

      const title = document.createElement("h3");
      title.textContent = LINE_NAMES[station.line] || station.line;

      const status = document.createElement("span");
      status.textContent = station.name;

      head.append(title, status);

      const grid = document.createElement("div");
      grid.className = "schedule-grid";

      const up = createScheduleDirectionBlock(station.line, "UP");
      const down = createScheduleDirectionBlock(station.line, "DOWN");
      grid.append(up.block, down.block);
      section.append(head, grid);

      return { section, status, up, down };
    }

    function ensureScheduleViews(stations) {
      const key = `${selectedStation.code}:${stations.map((station) => station.line).join("|")}`;
      if (key === scheduleRenderedKey) return;

      scheduleContainer.innerHTML = "";
      scheduleViews = new Map();

      for (const station of stations) {
        const view = createScheduleLineView(station);
        scheduleViews.set(station.line, view);
        scheduleContainer.appendChild(view.section);
      }

      scheduleRenderedKey = key;
    }

    function renderRouteMap() {
      routeMap.innerHTML = "";
      const canvas = document.createElement("div");
      canvas.className = "map-canvas";

      for (const [code, x, y] of MAP_POINTS) {
        const line = POINT_LINE_BY_CODE[code] || stationByCode.get(code)?.line;
        const station = stationByLineCode.get(`${line}|${code}`) || stationByCode.get(code);
        if (!station) continue;

        const button = document.createElement("button");
        button.type = "button";
        button.className = "station-button";
        button.dataset.line = station.line;
        button.dataset.code = station.code;
        button.dataset.stationId = String(station.id);
        const [labelX, labelY] = getLabelPoint(code, x, y);
        button.style.left = `${(labelX / MAP_WIDTH) * 100}%`;
        button.style.top = `${(labelY / MAP_HEIGHT) * 100}%`;
        button.title = `${stationText(station)}・${LINE_NAMES[station.line]}`;
        button.setAttribute("aria-label", button.title);
          button.textContent = station.name;
        button.addEventListener("click", () => selectStation(station));
        canvas.appendChild(button);
      }

      routeMap.appendChild(canvas);
    }

    function isMobileView() {
      return window.matchMedia("(max-width: 760px)").matches;
    }

    function focusMapOnStation(station, immediate = false) {
      if (!station || !isMobileView()) return;

      const button = routeMap.querySelector(`.station-button[data-line="${station.line}"][data-code="${station.code}"]`);
      if (!button) return;

      const targetLeft = button.offsetLeft - routeMap.clientWidth * 0.62;
      routeMap.scrollTo({
        left: Math.max(0, targetLeft),
        behavior: immediate ? "auto" : "smooth",
      });
    }

    function updateSelectedStationText() {
      const lines = getScheduleStations(selectedStation).map((station) => LINE_NAMES[station.line]);
      selectedStationText.textContent = `${selectedStation.name}・${lines.join(" / ")}`;
    }

    function updateMapClasses(reasonableCodes = null) {
      const buttons = routeMap.querySelectorAll(".station-button");
      for (const button of buttons) {
        const code = button.dataset.code;
        const line = button.dataset.line;
        const inScope = valueStationByCode.has(code);
        const isSelected = selectedStation && selectedStation.code === code && selectedStation.line === line;

        button.classList.toggle("is-selected", isSelected);
        button.classList.toggle("is-out-of-scope", !inScope);
        button.classList.remove("is-reasonable", "is-unreasonable");

        if (reasonableCodes && inScope && !isSelected) {
          button.classList.toggle("is-reasonable", reasonableCodes.has(code));
          button.classList.toggle("is-unreasonable", !reasonableCodes.has(code));
        }
      }
    }

    async function asyncPool(limit, items, worker) {
      const results = [];
      const executing = [];

      for (const item of items) {
        const promise = Promise.resolve().then(() => worker(item));
        results.push(promise);
        executing.push(promise);

        promise.finally(() => {
          const index = executing.indexOf(promise);
          if (index >= 0) executing.splice(index, 1);
        });

        if (executing.length >= limit) await Promise.race(executing);
      }

      return Promise.all(results);
    }

    async function fetchAdultOctopusFare(fromId, toId) {
      if (fromId === toId) return 0;

      const key = `${fromId}-${toId}`;
      const reverseKey = `${toId}-${fromId}`;
      if (fareCache.has(key)) return fareCache.get(key);
      if (fareCache.has(reverseKey)) return fareCache.get(reverseKey);

      const localFare = window.MTR_FARES?.[key] ?? window.MTR_FARES?.[reverseKey];
      if (localFare !== undefined) {
        const fare = Number(localFare);
        fareCache.set(key, Number.isFinite(fare) ? fare : 0);
        return fareCache.get(key);
      }

      const url = `https://www.mtr.com.hk/share/customer/jp/api/HRRoutes/?o=${fromId}&d=${toId}&lang=C`;
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      if (String(data.errorCode) !== "0") throw new Error(data.errorMsg || "MTR fare API error");

      const route = data.routes?.[0] || {};
      const standardFare = (route.fares || []).find((fare) => fare.fareTitle === "standardClass") || route.fares?.[0];
      const rawFare = standardFare?.fareInfo?.adult?.octopus;
      const fare = Number.parseFloat(rawFare);
      const result = Number.isFinite(fare) ? fare : 0;
      fareCache.set(key, result);
      return result;
    }

    async function calculateValueRange(originStation) {
      const cacheKey = String(originStation.id);
      if (valueRangeCache.has(cacheKey)) return valueRangeCache.get(cacheKey);

      const reasonableCodes = new Set();
      const targetStations = Array.from(valueStationByCode.values());

      await asyncPool(8, targetStations, async (targetStation) => {
        const fare = await fetchAdultOctopusFare(originStation.id, targetStation.id);
        if (fare >= PASS_TRIP_COST) reasonableCodes.add(targetStation.code);
      });

      valueRangeCache.set(cacheKey, reasonableCodes);
      return reasonableCodes;
    }

    async function loadValueRange() {
      const requestId = ++rangeRequestId;
      const originStation = getFareStation(selectedStation);

      updateMapClasses(null);

      if (!originStation) {
        rangeStatus.textContent = "不適用";
        passRangeText.textContent = `${selectedStation.name} 不屬都會票適用站，仍可查看即時班次`;
        updateMapClasses(new Set());
        return;
      }

      rangeStatus.textContent = window.MTR_FARES_UPDATED ? `本地票價 ${window.MTR_FARES_UPDATED}` : "即時計算中";
      passRangeText.textContent = `${originStation.name} 出發：正在按都會票適用站及 HK$11.5 門檻分類`;

      try {
        const reasonableCodes = await calculateValueRange(originStation);
        if (requestId !== rangeRequestId) return;

        updateMapClasses(reasonableCodes);
        rangeStatus.textContent = `合理 ${reasonableCodes.size} 站`;
        passRangeText.textContent = `${originStation.name} 出發：只計都會票適用站，成人八達通正價達 HK$11.5 或以上列為合理`;
      } catch (error) {
        if (requestId !== rangeRequestId) return;
        rangeStatus.textContent = "範圍計算失敗";
        passRangeText.textContent = "未能計算都會票範圍，保留路線圖選站功能";
        updateMapClasses(null);
        console.error(error);
      }
    }

    async function loadSchedule(options = {}) {
      const quiet = Boolean(options.quiet);
      const requestId = ++scheduleRequestId;
      const station = selectedStation.code;
      const stationName = selectedStation.name;
      const scheduleStations = getScheduleStations(selectedStation);
      const lineNames = scheduleStations.map((item) => LINE_NAMES[item.line] || item.line);

      ensureScheduleViews(scheduleStations);

      if (!quiet) {
        for (const item of scheduleStations) {
          const view = scheduleViews.get(item.line);
          if (!view) continue;
          setDirectionMessage(view.up.body, view.up.note, "載入中");
          setDirectionMessage(view.down.body, view.down.note, "載入中");
          view.status.textContent = "更新中";
        }
      }

      refreshScheduleButton.disabled = !quiet;
      scheduleStatus.textContent = scheduleStations.length > 1
        ? `${stationName}・${scheduleStations.length} 條線更新中`
        : `${lineNames[0]}・${stationName} 更新中`;

      try {
        const results = await Promise.all(scheduleStations.map(async (item) => {
          try {
            const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${item.line.toLowerCase()}&sta=${station}`;
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const json = await response.json();
            const key = `${item.line}-${station}`;
            const payload = json.data?.[key];
            return { station: item, payload, updatedAt: payload?.curr_time || json.curr_time || json.sys_time };
          } catch (error) {
            return { station: item, error };
          }
        }));
        if (requestId !== scheduleRequestId) return;

        let latestUpdate = "";
        let successCount = 0;

        for (const result of results) {
          const view = scheduleViews.get(result.station.line);
          if (!view) continue;

          if (result.error) {
            setDirectionMessage(view.up.body, view.up.note, "無法載入資料", true);
            setDirectionMessage(view.down.body, view.down.note, "無法載入資料", true);
            view.status.textContent = "讀取失敗";
            console.error(result.error);
            continue;
          }

          if (!result.payload) {
            setDirectionMessage(view.up.body, view.up.note, "未有資料");
            setDirectionMessage(view.down.body, view.down.note, "未有資料");
            view.status.textContent = "未有資料";
            continue;
          }

          renderScheduleDirection("UP", result.payload.UP || [], view.up.body, view.up.note);
          renderScheduleDirection("DOWN", result.payload.DOWN || [], view.down.body, view.down.note);
          view.status.textContent = `最後更新 ${formatApiTime(result.updatedAt)}`;
          latestUpdate = result.updatedAt || latestUpdate;
          successCount += 1;
        }

        if (!successCount) {
          scheduleStatus.textContent = `${stationName} 未有班次資料`;
        } else {
          scheduleStatus.textContent = scheduleStations.length > 1
            ? `${stationName}・${successCount}/${scheduleStations.length} 條線最後更新 ${formatApiTime(latestUpdate)}`
            : `${lineNames[0]}・${stationName} 最後更新 ${formatApiTime(latestUpdate)}`;
        }
      } catch (error) {
        if (!quiet) {
          for (const view of scheduleViews.values()) {
            setDirectionMessage(view.up.body, view.up.note, "無法載入資料", true);
            setDirectionMessage(view.down.body, view.down.note, "無法載入資料", true);
            view.status.textContent = "讀取失敗";
          }
          scheduleStatus.textContent = "班次更新失敗";
        } else {
          scheduleStatus.textContent = "更新失敗，保留上次資料";
        }
        console.error(error);
      } finally {
        if (requestId === scheduleRequestId) refreshScheduleButton.disabled = false;
        clockText.textContent = `本機時間 ${formatClock()}`;
      }
    }

    function selectStation(station, options = {}) {
      selectedStation = station;
      updateSelectedStationText();
      updateMapClasses(null);
      requestAnimationFrame(() => focusMapOnStation(station, Boolean(options.immediateFocus)));
      loadSchedule();
      loadValueRange();
    }

    renderRouteMap();
    selectStation(selectedStation, { immediateFocus: true });

    refreshScheduleButton.addEventListener("click", () => loadSchedule({ quiet: true }));

    setInterval(() => loadSchedule({ quiet: true }), 10000);
    setInterval(() => {
      clockText.textContent = `本機時間 ${formatClock()}`;
    }, 1000);
  </script>
